<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Basic</title>
  </head>
  <body>
    <h3>if - else if - else</h3>
    <pre>
      작성법
      if(조건식1) {
        조건식1이 true일 때 수행할 코드
      } else if(조건식2) {
        조건식1이 false이면서
        조건식2가 true일 때 수행할 코드
      } else {
        위의 조건식들을 모두 만족하지 않는 경우
        수행할 코드
      }
    </pre>
    <script>
      let month = new Date().getMonth() + 1;

      // month = 12;

      if (month >= 3 && month <= 5) {
        // &&(AND) : 조건식이 둘다 true일 때만 실행
        // 3 ~ 5월 : 봄
        alert('봄입니다');
      } else if (month >= 6 && month <= 8) {
        // 6 ~ 8월 : 여름
        alert('여름입니다');
      } else if (month >= 9 && month <= 11) {
        // 9 ~ 11월 : 가을
        alert('가을입니다');
      } else if (month == 1 || month == 2 || month == 12) {
        // == : 같다
        // = : 대입연산자
        // ||(or) : 조건식이 하나라도 true라면 수행
        // 12, 1, 2 : 겨울
        alert('겨울입니다');
      } else {
        alert('잘못된 월 입니다.');
      }
    </script>
  </body>
</html>
