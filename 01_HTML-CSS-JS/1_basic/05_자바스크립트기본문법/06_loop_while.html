<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Javascript Basic</title>
  </head>
  <body>
    <h3>while문</h3>
    <pre>
      작성법
      while(조건식) {
        반복 수행할 코드
      }
    </pre>
    <script>
      let array = [10, 20, 30, 40, 50];

      let i = 0; // 변수 선언 및 초기화
      while (i < array.length) {
        console.log(array[i++]);
        // 배열명[인덱스번호] : 배열에 담긴 값 꺼내기
        // i++ : 코드 수행 후 i값 1 증가
        // ++i : 값 1 증가 후 코드 수행
        // i++;
      }
    </script>
  </body>
</html>
