<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Basic</title>
    <script>
      window.onload = () => {
        const h1 = document.querySelector('h1');
        h1.innerText = 'From JavaScript';
        h1.style.backgroundColor = 'red';
        h1.style.color = 'orange';
      };
    </script>
  </head>
  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>
