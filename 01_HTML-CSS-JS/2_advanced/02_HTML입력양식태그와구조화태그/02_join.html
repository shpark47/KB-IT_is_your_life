<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <fieldset>
      <legend>회원가입</legend>
      <form>
        <table>
          <tr>
            <th><label for="id">사용자 ID</label></th>
            <td><input type="text" id="id" name="id" /></td>
          </tr>
          <tr>
            <th><label for="password">비밀번호</label></th>
            <td><input type="password" id="password" name="password" /></td>
          </tr>
          <tr>
            <th><label for="correct">비밀번호 확인</label></th>
            <td><input type="password" id="correct" name="correct" /></td>
          </tr>
          <tr>
            <th><label for="name">이름</label></th>
            <td><input type="text" id="name" name="name" /></td>
          </tr>
          <tr>
            <th><label>성별</label></th>
            <td>
              <input type="radio" id="male" name="gender" value="남" />
              <label for="male">남</label>
              <input type="radio" id="female" name="gender" value="여" />
              <label for="female">여</label>
            </td>
          </tr>
          <tr>
            <th><label for="favorite">취미</label></th>
            <td>
              <input type="checkbox" id="soccer" name="sports" value="축구" />
              <label for="soccer">축구</label>
              <input type="checkbox" id="baseball" name="sports" value="야구" />
              <label for="baseball">야구</label>
              <input
                type="checkbox"
                id="volleyball"
                name="sports"
                value="배구"
              />
              <label for="volleyball">배구</label>
              <input
                type="checkbox"
                id="basketball"
                name="sports"
                value="농구"
              />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <tr>
            <th><label for="email">이메일</label></th>
            <td><input type="email" id="email" name="email" /></td>
          </tr>
          <tr>
            <th><label for="role">역할</label></th>
            <td>
              <select id="role">
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
          <tr>
            <td colspan="2">
              <input type="submit" value="확인" />
              <input type="reset" value="다시쓰기" />
            </td>
          </tr>
        </table>
      </form>
    </fieldset>
  </body>
</html>
